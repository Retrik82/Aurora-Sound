services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      BACKEND_PUBLIC_URL: http://localhost:8000
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/assets:/app/assets
    ports:
      - "8000:8000"
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      BACKEND_PUBLIC_URL: http://localhost:8000
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/assets:/app/assets
    depends_on:
      - redis
    command: dramatiq app.workers.tasks

  frontend:
    build:
      context: ./frontend
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
